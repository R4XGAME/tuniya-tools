name: tuniya_tools
description: TUNIYA TOOLS - All-in-one utility app by R4XGAMEZ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Fonts
  google_fonts: ^6.2.1

  # Storage & Preferences
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4

  # Permissions
  permission_handler: ^11.3.1

  # Networking & APIs
  dio: ^5.7.0
  http: ^1.2.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2
  pdfx: ^2.7.0

  # Archive (ZIP/JAR)
  archive: ^3.6.1

  # Image Processing
  image: ^4.2.0
  image_picker: ^1.1.2
  image_cropper: ^7.1.0
  flutter_colorpicker: ^1.1.0

  # Media - using safe LTS version
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  just_audio: ^0.9.40
  video_player: ^2.9.2

  # File
  file_picker: ^8.1.4
  open_file: ^3.5.7
  share_plus: ^10.0.2

  # Voice / TTS / STT
  speech_to_text: ^6.6.2
  flutter_tts: ^4.1.0

  # Code Editor
  flutter_code_editor: ^0.3.1
  highlight: ^0.7.0

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1

  # Utils
  crypto: ^3.0.5
  encrypt: ^5.0.3
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  device_info_plus: ^10.1.2
  battery_plus: ^6.0.3
  connectivity_plus: ^6.1.1
  sensors_plus: ^4.0.2
  local_auth: ^2.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  flutter_background_service: ^5.0.12
  workmanager: ^0.5.2
  receive_sharing_intent: ^1.8.0
  flutter_local_notifications: ^17.2.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/

